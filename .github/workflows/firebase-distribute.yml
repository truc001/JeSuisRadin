name: Firebase App Distribution

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  distribute:
    name: Build & Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/service-account.json

      - name: Build & upload to App Distribution
        working-directory: comparateur_app
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: >
          ./gradlew appDistributionUploadDebug
          -PversionCode=${{ github.run_number }}
          -PversionName="1.0.${{ github.run_number }}"

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/service-account.json
